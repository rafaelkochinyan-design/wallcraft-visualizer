services:
  - type: web
    name: wallcraft-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: R2_ACCOUNT_ID
        value: skip
      - key: R2_ACCESS_KEY_ID
        value: skip
      - key: R2_SECRET_ACCESS_KEY
        value: skip
      - key: R2_BUCKET_NAME
        value: skip
      - key: R2_PUBLIC_URL
        value: skip
      - key: API_PUBLIC_URL
        value: https://wallcraft-api.onrender.com
